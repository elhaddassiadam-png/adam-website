<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>تحميل البانر</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0820;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 28px;
    font-family: Arial, sans-serif;
  }
  #msg {
    color: #F59E0B;
    font-size: 18px;
    text-align: center;
    padding: 10px 28px;
    border: 1px solid rgba(245,158,11,0.4);
    border-radius: 8px;
    background: rgba(245,158,11,0.07);
  }
  button {
    padding: 16px 48px;
    background: linear-gradient(135deg, #F59E0B, #FCD34D);
    color: #0F0C29;
    border: none;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 24px rgba(245,158,11,0.3);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(245,158,11,0.4); }
  #preview {
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 8px;
    overflow: hidden;
  }
  #preview svg { display: block; }
  canvas { display: none; }
  .info { color: rgba(255,255,255,0.45); font-size: 13px; }
</style>
</head>
<body>

<p id="msg">🖼 معاينة البانر — اضغط الزر للتحميل PNG بجودة 1200×300</p>

<!-- معاينة مصغرة -->
<div id="preview">
  <svg id="banner" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1200 300" width="900" height="225">

    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#0F0C29"/>
        <stop offset="50%"  stop-color="#1E1B4B"/>
        <stop offset="100%" stop-color="#3730A3"/>
      </linearGradient>
      <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#F59E0B"/>
        <stop offset="100%" stop-color="#FCD34D"/>
      </linearGradient>
      <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="#FCD34D"/>
        <stop offset="100%" stop-color="#F59E0B"/>
      </linearGradient>
      <radialGradient id="glow" cx="25%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#0F0C29" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="shine" cx="35%" cy="35%" r="55%">
        <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </radialGradient>
      <filter id="gf" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="ts">
        <feDropShadow dx="0" dy="1" stdDeviation="3"
                      flood-color="#0F0C29" flood-opacity="0.7"/>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="300" fill="url(#bg)"/>
    <ellipse cx="200" cy="150" rx="260" ry="180" fill="url(#glow)"/>

    <!-- Subtle diagonal lines -->
    <line x1="0" y1="0" x2="300" y2="300" stroke="rgba(255,255,255,0.015)" stroke-width="40"/>

    <!-- ═══ ICON AREA (left square zone) ═══ -->
    <!-- Outer corner brackets — golden frame -->
    <path d="M 18,55  L 18,18  L 55,18"  fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 245,18 L 282,18 L 282,55" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 18,245 L 18,282 L 55,282" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 245,282 L 282,282 L 282,245" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Globe glow -->
    <circle cx="150" cy="150" r="104" fill="rgba(79,70,229,0.18)" filter="url(#gf)"/>

    <!-- Globe outer circle -->
    <circle cx="150" cy="150" r="88" fill="rgba(255,255,255,0.05)"
            stroke="rgba(255,255,255,0.82)" stroke-width="1.8"/>
    <circle cx="150" cy="150" r="88" fill="url(#shine)"/>

    <!-- Equator (gold) -->
    <line x1="62" y1="150" x2="238" y2="150" stroke="#F59E0B" stroke-width="1.8"/>

    <!-- Central meridian (gold) -->
    <ellipse cx="150" cy="150" rx="37" ry="88" fill="none" stroke="#F59E0B" stroke-width="1.6"/>

    <!-- Latitude arcs -->
    <path d="M 75 110 A 78 30 0 0 1 225 110" fill="none"
          stroke="rgba(255,255,255,0.18)" stroke-width="1.1"/>
    <path d="M 75 190 A 78 30 0 0 0 225 190" fill="none"
          stroke="rgba(255,255,255,0.18)" stroke-width="1.1"/>

    <!-- Gold cursor -->
    <g transform="translate(208,180) rotate(-12)" filter="url(#gf)">
      <path d="M0,0 L0,22 L6,17 L10,28 L14,27 L10,16 L17,16 Z"
            fill="url(#goldV)" stroke="#0F0C29" stroke-width="1" stroke-linejoin="round"/>
    </g>

    <!-- ═══ VERTICAL SEPARATOR ═══ -->
    <line x1="316" y1="28" x2="316" y2="272"
          stroke="url(#gold)" stroke-width="1" opacity="0.40"/>
    <!-- diamond on separator -->
    <rect x="310" y="144" width="12" height="12" fill="url(#gold)"
          transform="rotate(45 316 150)" opacity="0.7"/>

    <!-- ═══ TEXT AREA ═══ -->
    <!-- Arabic name -->
    <text x="760" y="148"
          font-family="Tahoma,'Segoe UI',Arial,sans-serif"
          font-size="88" font-weight="900"
          fill="#FFFFFF" text-anchor="middle"
          filter="url(#ts)">آدم الحدسي</text>

    <!-- Gold rule under name -->
    <rect x="340" y="168" width="840" height="1.5" rx="1"
          fill="url(#gold)" opacity="0.55"/>

    <!-- PROFESSIONAL WEB DESIGN -->
    <text x="760" y="222"
          font-family="Arial,'Segoe UI',sans-serif"
          font-size="26" font-weight="700"
          fill="rgba(255,255,255,0.78)"
          text-anchor="middle" letter-spacing="6">PROFESSIONAL WEB DESIGN</text>

    <!-- Subtle right-side dots -->
    <g fill="rgba(255,255,255,0.055)">
      <circle cx="1120" cy="50"  r="3"/><circle cx="1148" cy="50"  r="3"/><circle cx="1176" cy="50"  r="3"/>
      <circle cx="1120" cy="78"  r="3"/><circle cx="1148" cy="78"  r="3"/><circle cx="1176" cy="78"  r="3"/>
      <circle cx="1120" cy="106" r="3"/><circle cx="1148" cy="106" r="3"/><circle cx="1176" cy="106" r="3"/>
      <circle cx="1120" cy="220" r="3"/><circle cx="1148" cy="220" r="3"/><circle cx="1176" cy="220" r="3"/>
      <circle cx="1120" cy="248" r="3"/><circle cx="1148" cy="248" r="3"/><circle cx="1176" cy="248" r="3"/>
    </g>

    <!-- Top & bottom thin gold lines -->
    <rect x="0" y="0"   width="1200" height="2.5" fill="url(#gold)" opacity="0.45"/>
    <rect x="0" y="297" width="1200" height="2.5" fill="url(#gold)" opacity="0.45"/>

  </svg>
</div>

<button onclick="downloadBanner()">⬇ تحميل البانر PNG — 1200×300</button>
<p class="info">الجودة: 1200 × 300 بكسل — مناسب للواتساب والمواقع</p>

<!-- Canvas بالحجم الحقيقي للتصدير -->
<canvas id="canvas" width="1200" height="300"></canvas>

<script>
function downloadBanner() {
  const svg    = document.getElementById('banner');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const msg    = document.getElementById('msg');

  // نسخ مؤقتة بالأبعاد الكاملة
  const clone = svg.cloneNode(true);
  clone.setAttribute('width',  '1200');
  clone.setAttribute('height', '300');

  msg.textContent = '⏳ جاري التحويل...';

  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url     = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = function () {
    ctx.clearRect(0, 0, 1200, 300);
    ctx.drawImage(img, 0, 0, 1200, 300);
    URL.revokeObjectURL(url);
    try {
      const pngUrl = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.download = 'adam-elhaddassi-banner.png';
      a.href = pngUrl;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      msg.textContent = '✅ تم التحميل! — adam-elhaddassi-banner.png';
    } catch(e) {
      msg.textContent = '⚠️ ' + e.message;
    }
  };
  img.onerror = () => { msg.textContent = '⚠️ فشل — تأكد من فتح الملف في Chrome'; };
  img.src = url;
}
</script>
</body>
</html>
